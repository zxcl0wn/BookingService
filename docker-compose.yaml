version: "3.9"

services:
  app:
    image: booking_service
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: booking_service_app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8001:8000"

#    volumes:
#      - ./backend/app:/backend/app
#      - ./backend/alembic:/backend/alembic
#      - ./backend/alembic.ini:/backend/alembic.ini

  db:
    image: postgres:16.0-alpine
    container_name: booking_service_postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_HOST: ${DB_HOST}
      POSTGRES_PORT: ${DB_PORT}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gleb_admin -d booking_service"]

  redis:
    image: redis:8.6.2-alpine
    container_name: booking_service_redis
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    volumes:
      - minio_data:/data
    container_name: booking_service_minio
    env_file:
      - .env
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 30s
      timeout: 20s
      retries: 3


volumes:
  postgres_data:
  redis_data:
  minio_data:
